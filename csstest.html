
<!doctype html>
<html>
	<head>
		<style>
			
			:root {
				--nullcss-widget-backcolour: #323;
				--nullcss-widget-bordercolour-dark: #212;
				--nullcss-widget-bordercolour-light: #434;
				--nullcss-title-firstcolour: #848;
				--nullcss-title-secondcolour: #101;
				--nullcss-textcolour: #fff;
			}
			
			body {
				background-color: #000;
				color: #fff;
				padding: 0em;
				margin: 0em;
				
				font-family: monospace;
			}
			
			.nullcss-button {
				background-color: var(--nullcss-widget-backcolour);
				border: 2px solid var(--nullcss-widget-bordercolour-dark);
				border-top-color: var(--nullcss-widget-bordercolour-light);
				border-left-color: var(--nullcss-widget-bordercolour-light);
			}
			
			.nullcss-closebutton {
				background-color: var(--nullcss-widget-backcolour);
				border: 2px solid var(--nullcss-widget-bordercolour-dark);
				border-top-color: var(--nullcss-widget-bordercolour-light);
				border-left-color: var(--nullcss-widget-bordercolour-light);
				min-width: 1em;
				max-width: 1em;
				min-height: 1em;
				max-height: 1em;
				
				position: relative;
				left: 0.3em;
				bottom: 0.3em;
			}
			
			.nullcss-titlebar {
				min-width: 2em;
				max-width: 2em;
				background: linear-gradient(0deg, var(--nullcss-title-firstcolour), var(--nullcss-title-secondcolour));
				border-right: 2px solid #202;
				writing-mode: vertical-lr;
				display: flex;
			}
			
			.nullcss-titletext {
				padding: 4px;
			}
			
			.nullcss-titlebar-spacing {
				flex-grow: 1;
			}
			
			.nullcss-window {
				box-shadow: 
					inset -1px -1px var(--nullcss-widget-bordercolour-dark), 
					inset 1px 1px var(--nullcss-widget-bordercolour-light),
					inset -2px -2px var(--nullcss-widget-bordercolour-dark), 
					inset 2px 2px var(--nullcss-widget-bordercolour-light);
				background-color: var(--nullcss-widget-backcolour);
				padding: 2px;
				display: flex;
			}
		</style>
	</head>
	
	<body>
		<div class="nullcss-window" style="margin: 4em; max-width: 400px; min-height: 400px;">
			<div class="nullcss-titlebar">
				<span class="nullcss-titletext">I'm an example!</span>
				<div class="nullcss-titlebar-spacing"></div>
				<div class="nullcss-closebutton"></div>
			</div>
			<div class="nullcss-button" style="margin: 1em; min-width: 100px; min-height: 80px; max-height: 80px"></div>
		</div>
		
		<div class="nullcss-window" style="position: absolute; min-width: -moz-available; min-height: 2em;">
			<div>
		</div>
	</body>
</html>
