	<head>
		<title>voidnull('s site)</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<style>
			/*
				hey, i changed it to use em and vh !
				isn't that fun.
				i only just learnt about vh like a few minutes ago.
			*/
			
			body {
				background-color: black;

			}
			div {

			#randotext {
				position: absolute;

		</style>
		<link href="assets/nullui.css" rel="stylesheet"></link>
		<script>
			var msgs = [
				"hiya!",
				"i don't have much to show here",
				"i mean, it's a website, yeah",
				"be glad i'm not using any javascript frameworks",
				"zzzz i'm so sleepy zzz",
				"i don't know if i'm an insomniac but it's kinda funny to think so", // to me, it's funny to me
				"god, i should get to sleep earlier",
				"javascript is a pain but you already knew that",
				"i <i>do</i> sometimes program in real languages, you know",
				"oh, look, it's the last message in the list!",
			]
			
			var alreadyloaded = false;
			var textcol = 0;
			var textpos = 0;
			var currentletter = 0;
			var donethething = 0;
			var rampup = 0;
			
			// i'm copying this from reddit's 504 page which is on github.
			// or was, i dunno.
			
			function randint(low, high) {
				return Math.round(Math.random() * (high - low + 1)) + low;
			}
			function randmsg() {
				return msgs[randint(0, msgs.length - 2)];
			}
			
			function changemsg() {
				var mg = document.getElementById("randotext");
				mg.innerHTML = randmsg();
			}
			
			// this stuff was made by me, though
			// you can tell because it sucks ass
			
			function nextcol() {
				var posconst = 7;
				var tmpposc = 0; // i don't trust javascript enough
				var tmpcol = 0;
				
				var textsat = 50;
				
				// this is a hack, plain and simple
				// it's not good, but the end result looks nice, so
				var l1 = document.getElementById("l1");
				var l2 = document.getElementById("l2");
				var l3 = document.getElementById("l3");
				var l4 = document.getElementById("l4");
				var l5 = document.getElementById("l5");
				var l6 = document.getElementById("l6");
				var l7 = document.getElementById("l7");
				var l8 = document.getElementById("l8");
				
				textcol = textcol + 0.1;
				textpos = textpos + 0.05;
				
				tmpposc = -posconst + rampup + 6;
				tmpcol = tmpposc / 7;
				
				// apologies in advance if you've set your browser to scale up the webpage
				// or if you're going to throw up from this block of code
				var s1 = "color: hsl(" + (textcol + 5) + ", " + (textsat * tmpcol) + "%, " + (100 - (textsat * tmpcol) + 10) + "%); transform: translate(-2.20em, " + Math.sin(textpos + 5) * tmpposc + "px);" // -140px
				var s2 = "color: hsl(" + (textcol + 10) + ", " + (textsat * tmpcol) + "%, " + (100 - (textsat * tmpcol) + 10) + "%); transform: translate(-1.65em, " + Math.sin(textpos + 10) * tmpposc + "px);"; // -105px
				var s3 = "color: hsl(" + (textcol + 15) + ", " + (textsat * tmpcol) + "%, " + (100 - (textsat * tmpcol) + 10) + "%); transform: translate(-1.10em, " + Math.sin(textpos + 15) * tmpposc + "px);"; // -70px
				var s4 = "color: hsl(" + (textcol + 20) + ", " + (textsat * tmpcol) + "%, " + (100 - (textsat * tmpcol) + 10) + "%); transform: translate(-0.55em, " + Math.sin(textpos + 20) * tmpposc + "px);"; //-35px
				var s5 = "color: hsl(" + (textcol + 25) + ", " + (textsat * tmpcol) + "%, " + (100 - (textsat * tmpcol) + 10) + "%); transform: translate(0em, " + Math.sin(textpos + 25) * tmpposc + "px);";
				var s6 = "color: hsl(" + (textcol + 30) + ", " + (textsat * tmpcol) + "%, " + (100 - (textsat * tmpcol) + 10) + "%); transform: translate(0.55em, " + Math.sin(textpos + 30) * tmpposc + "px);";
				var s7 = "color: hsl(" + (textcol + 35) + ", " + (textsat * tmpcol) + "%, " + (100 - (textsat * tmpcol) + 10) + "%); transform: translate(1.10em, " + Math.sin(textpos + 35) * tmpposc + "px);";
				var s8 = "color: hsl(" + (textcol + 40) + ", " + (textsat * tmpcol) + "%, " + (100 - (textsat * tmpcol) + 10) + "%); transform: translate(1.65em, " + Math.sin(textpos + 40) * tmpposc + "px);";
				
				var bc = "background-color: hsl(" + (1 - textcol) + ", " + (50 * tmpcol) + "%, " + ((textsat * tmpcol) / 8) + "%);";
				document.body.style = bc;
				
				l1.style = s1;
				l2.style = s2;
				l3.style = s3;
				l4.style = s4;
				l5.style = s5;
				l6.style = s6;
				l7.style = s7;
				l8.style = s8;
				
				// apparently css styles can do something like this but better,
				// i don't care enough, though
			}
			
			function dothecoolloadthing() {
				if(currentletter > 8) return;
				
				var l1 = document.getElementById("l1");
				var l2 = document.getElementById("l2");
				var l3 = document.getElementById("l3");
				var l4 = document.getElementById("l4");
				var l5 = document.getElementById("l5");
				var l6 = document.getElementById("l6");
				var l7 = document.getElementById("l7");
				var l8 = document.getElementById("l8");
				
				currentletter = currentletter + 4;
				if(currentletter > 8) {
					setInterval(function() {nextcol();}, 1);
					setInterval(function() {ramp();}, 100);
				}
				
				// mmm i love ctrl+d 
				// thank you npp for being a good text editor
				if(currentletter > 0) l1.style = "display: inline; transform: translate(-2.20em, 0px);";
				else l1.style = "display: none;";
				if(currentletter > 1) l2.style = "display: inline; transform: translate(-1.65em, 0px);";
				else l2.style = "display: none;";
				if(currentletter > 2) l3.style = "display: inline; transform: translate(-1.10em, 0px);";
				else l3.style = "display: none;";
				if(currentletter > 3) l4.style = "display: inline; transform: translate(-0.55em, 0px);";
				else l4.style = "display: none;";
				if(currentletter > 4) l5.style = "display: inline; transform: translate(0em, 0px);";
				else l5.style = "display: none;";
				if(currentletter > 5) l6.style = "display: inline; transform: translate(0.55em, 0px);";
				else l6.style = "display: none;";
				if(currentletter > 6) l7.style = "display: inline; transform: translate(1.10em, 0px);";
				else l7.style = "display: none;";
				if(currentletter > 7) l8.style = "display: inline; transform: translate(1.65em, 0px);";
				else l8.style = "display: none;";
			}
			
			function ramp() {
				if(rampup < 10) rampup = rampup + 1;
			}
			
			function load() {
				if(alreadyloaded) return;
				alreadyloaded = true;
				
				document.getElementById("l1").style = "display: none;";
				document.getElementById("l2").style = "display: none;";
				document.getElementById("l3").style = "display: none;";
				document.getElementById("l4").style = "display: none;";
				document.getElementById("l5").style = "display: none;";
				document.getElementById("l6").style = "display: none;";
				document.getElementById("l7").style = "display: none;";
				document.getElementById("l8").style = "display: none;";
				
				setInterval(function() {dothecoolloadthing();}, 450);
				setInterval(function() {changemsg();}, 10 * 1000);
				
				// weird that the javascript console also supports css styling
				console.log("%cHi there.", "font-size: 24px;");
				console.log("%cFor some reason, browser consoles, like Firefox's, supports CSS.", "font-size: 16px;");
				console.log("%cSo now I get to do this.", "font-size: 8px;");
			}
			
			window.onload = load;
		</script>

				<h1 id="l2">o</h1>
				<h1 id="l3">i</h1>
				<h1 id="l4">d</h1>
				<h1 id="l5">n</h1>
				<h1 id="l6">u</h1>
				<h1 id="l7">l</h1>
				<h1 id="l8">l</h1>
			</div>
			<h3 id="randotext"></h3>
			<noscript>
				<h3 id="randotext">(you don't have javascript enabled, so cool things can't appear here)</h3>
			</noscript>
		</div>
