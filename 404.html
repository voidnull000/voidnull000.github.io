
<!doctype html>
<html lang="en">
	<head>
		<title>couldn't find that.</title>
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		<style>
			body {
				background: center / contain no-repeat linear-gradient(180deg, #000, #303);
				color: white;
				font-family: monospace;
				text-align: center;
				overflow: hidden;
			}
			
			#container {
				position: absolute;
				top: 37vh;
				width: 50vh;
				margin-left: 50vh;
				height: 25vh;
			}
			h1 {
				font-size: 6vh;
			}
			#sleepz {
				position: absolute;
				top: 0px;
				margin-left: 45%;
				width: 30%;
			}
			#sleepz h1 {
				position: absolute;
			}
			#links {
				text-align: right;
			}
			a {
				/* pain */
				color: #fff;
				text-decoration: none;
			}
		</style>
		<link href="/assets/nullui.css" rel="stylesheet"></link>
		<script>
			var zs = [];
			
			// this took way too long to do, but the result is something that looks sort of okay.
			// if you're wondering why i don't use jquery or any external libraries for this,
			//
			// it's because you're a weakling for even wanting to use them, nerd.
			// seriously, you can do pretty much everything jquery or whatever does in vanilla script,
			// and it'll load a hell of a lot faster.
			//
			// search up "the best fucking website ever made" for more information.
			
			function makez() {
				var elem = document.createElement("h2");
				elem.className = "z";
				if(Math.random() * 10 > 5) elem.textContent = "Z";
				else elem.textContent = "z";
				elem.style.position = "absolute";
				
				return elem;
			}
			
			function spawnz() {
				var sleepel = document.getElementById("sleepz");
				if(Math.random() * 10 > 5) {
					zy = {
						ox: Math.random() * 100,
						x: 0,
						y: 500,
						r: Math.random(),
						el: makez()
					}
					sleepel.appendChild(zy.el);
					zy.el.style.top = zy.y + "px";
					zy.el.style.left = zy.x + "px";
					zs.push(zy);
				}
			}
			
			function updatez() {
				var sleepel = document.getElementById("sleepz");
				var newzs = [];
				
				for(var i = 0; i < zs.length; i++) {
					var z = zs[i];
					z.y -= (0.5 * z.y) * 0.01;
					if(z.y < 0.5) {
						sleepel.removeChild(z.el);
					} else {
						z.el.style.top = z.y + "vh";
						z.el.style.left = z.ox + (Math.sin(z.x + (z.y / 10) + z.r) * 15) + "px";
						z.el.style.opacity = z.y / 100;
						newzs.push(z);
					}
				}
				
				zs = newzs;
			}
			
			function load() {
				setInterval(function() {spawnz();}, 1500);
				setInterval(function() {updatez();}, 1);
			}
		
			window.onload = load;
		</script>
	</head>
	<body>
		<div style="height: 256vh;"> <!-- miserable hack, but mdn is completely fucking useless on this -->
			<div id="container" style="z-index: 10000" class="nullcss-window">
				<div class="nullcss-titlebar" style="margin-right: 0.5em">
					<span class="nullcss-titletext">page not found</span>
					<div class="nullcss-titlebar-spacing"></div>
					<div class="nullcss-closebutton">X</div>
				</div>
				
				<h1 style="margin: 1vh">404</h1>
				<div style="align-content: center; margin: 1vh">
					<p>(try to use one of the links next time)</p>
					<br>
					<a style="position: relative; padding: 1vh" href="/" class="nullcss-button" >take me home, please</a>
				</div>
			</div>
			<div id="sleepz"></div>
		</div>
	</body>
</html>
